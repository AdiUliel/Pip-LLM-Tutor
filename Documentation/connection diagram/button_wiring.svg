<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="572" viewBox="0 0 1420 572" font-family="DejaVu Sans, Verdana, Helvetica, Arial, sans-serif">

  <rect x="0" y="0" width="1420" height="930" fill="#f8fafc"/>

  <!-- ── Title ────────────────────────────────────────────────────────────── -->
  <text x="60" y="56" font-size="30" font-weight="bold" fill="#0f172a">Push-to-Talk Button — Wiring to IO2 / IO3</text>
  <text x="60" y="86" font-size="16" fill="#64748b">Pip LLM Tutor  ·  LCDWIKI 2.8" ESP32-S3 Display (ES3C28P)  ·  P3 expansion header</text>
  <line x1="60" y1="108" x2="1360" y2="108" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ── Schematic panel ──────────────────────────────────────────────────── -->
  <rect x="60" y="140" width="1300" height="405" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ===== ESP32-S3 block ===== -->
  <rect x="80" y="190" width="420" height="330" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2.5"/>
  <path d="M80 198 a8 8 0 0 1 8 -8 h404 a8 8 0 0 1 8 8 v40 h-420 z" fill="#1e293b"/>
  <text x="290" y="219" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">ESP32-S3</text>

  <!-- 3V3 rail -->
  <line x1="350" y1="290" x2="460" y2="290" stroke="#0f172a" stroke-width="2.5"/>
  <text x="405" y="279" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">3V3</text>

  <!-- internal pull-up resistor -->
  <line x1="405" y1="290" x2="405" y2="312" stroke="#0f172a" stroke-width="2.5"/>
  <rect x="394" y="312" width="22" height="60" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
  <line x1="405" y1="372" x2="405" y2="416" stroke="#0f172a" stroke-width="2.5"/>
  <text x="428" y="337" font-size="13" fill="#64748b">internal pull-up</text>
  <text x="428" y="356" font-size="13" fill="#64748b">≈ 45 kΩ</text>

  <!-- IO3 net inside MCU -->
  <line x1="170" y1="416" x2="506" y2="416" stroke="#2563eb" stroke-width="3"/>
  <circle cx="405" cy="416" r="5.5" fill="#2563eb"/>
  <text x="170" y="406" font-size="14" font-weight="bold" fill="#2563eb">PIN_BTN</text>
  <text x="170" y="440" font-size="12.5" fill="#64748b">pinMode(PIN_BTN, INPUT_PULLUP)</text>

  <!-- IO2 net inside MCU -->
  <line x1="170" y1="479" x2="506" y2="479" stroke="#0f172a" stroke-width="3"/>
  <text x="170" y="469" font-size="14" font-weight="bold" fill="#0f172a">PIN_BTN_GND</text>
  <text x="170" y="503" font-size="12.5" fill="#64748b">digitalWrite(PIN_BTN_GND, LOW)</text>

  <!-- MCU pin pads -->
  <rect x="494" y="410" width="12" height="12" fill="#2563eb"/>
  <rect x="494" y="473" width="12" height="12" fill="#0f172a"/>

  <!-- ===== MCU → header wires ===== -->
  <line x1="506" y1="416" x2="684" y2="416" stroke="#2563eb" stroke-width="3"/>
  <line x1="506" y1="479" x2="684" y2="479" stroke="#0f172a" stroke-width="3"/>
  <text x="595" y="405" font-size="14" font-weight="bold" fill="#2563eb" text-anchor="middle">IO3</text>
  <text x="595" y="468" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">IO2</text>

  <!-- ===== P3 expansion header ===== -->
  <text x="750" y="222" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">P3 — expansion header</text>
  <rect x="690" y="240" width="120" height="280" rx="6" fill="#fefce8" stroke="#1e293b" stroke-width="2.5"/>

  <!-- pin 4 : IO21 (unused) -->
  <rect x="684" y="284" width="12" height="12" fill="#cbd5e1"/>
  <rect x="804" y="284" width="12" height="12" fill="#cbd5e1"/>
  <text x="706" y="295" font-size="13" fill="#94a3b8">4</text>
  <text x="728" y="295" font-size="13.5" fill="#94a3b8">IO21</text>
  <line x1="816" y1="290" x2="852" y2="290" stroke="#cbd5e1" stroke-width="2.5" stroke-dasharray="5 4"/>
  <text x="860" y="295" font-size="12.5" fill="#94a3b8">unused</text>

  <!-- pin 3 : IO14 (unused) -->
  <rect x="684" y="347" width="12" height="12" fill="#cbd5e1"/>
  <rect x="804" y="347" width="12" height="12" fill="#cbd5e1"/>
  <text x="706" y="358" font-size="13" fill="#94a3b8">3</text>
  <text x="728" y="358" font-size="13.5" fill="#94a3b8">IO14</text>
  <line x1="816" y1="353" x2="852" y2="353" stroke="#cbd5e1" stroke-width="2.5" stroke-dasharray="5 4"/>
  <text x="860" y="358" font-size="12.5" fill="#94a3b8">unused</text>

  <!-- pin 2 : IO3 -->
  <rect x="684" y="410" width="12" height="12" fill="#2563eb"/>
  <rect x="804" y="410" width="12" height="12" fill="#2563eb"/>
  <text x="706" y="421" font-size="13" fill="#0f172a">2</text>
  <text x="728" y="421" font-size="13.5" font-weight="bold" fill="#2563eb">IO3</text>

  <!-- pin 1 : IO2 -->
  <rect x="684" y="473" width="12" height="12" fill="#0f172a"/>
  <rect x="804" y="473" width="12" height="12" fill="#0f172a"/>
  <text x="706" y="484" font-size="13" fill="#0f172a">1</text>
  <text x="728" y="484" font-size="13.5" font-weight="bold" fill="#0f172a">IO2</text>

  <!-- ===== header → button ===== -->
  <line x1="816" y1="416" x2="1080" y2="416" stroke="#2563eb" stroke-width="3"/>
  <polyline points="816,479 1285,479 1285,416" fill="none" stroke="#0f172a" stroke-width="3"/>

  <text x="948" y="405" font-size="12.5" fill="#64748b" text-anchor="middle">HIGH when released  ·  LOW when pressed</text>
  <text x="1050" y="502" font-size="12.5" fill="#64748b" text-anchor="middle">driven LOW — acts as the button's ground</text>

  <!-- ===== switch SW1 ===== -->
  <text x="1182" y="290" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">SW1 — push-to-talk</text>
  <text x="1182" y="311" font-size="12.5" fill="#64748b" text-anchor="middle">momentary tactile, SPST-NO</text>
  <line x1="1140" y1="340" x2="1224" y2="340" stroke="#0f172a" stroke-width="5" stroke-linecap="round"/>
  <line x1="1182" y1="340" x2="1182" y2="389" stroke="#0f172a" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="1080" y1="416" x2="1274" y2="381" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="1080" cy="416" r="6" fill="#2563eb"/>
  <circle cx="1285" cy="416" r="6" fill="#0f172a"/>

  <!-- ── Logic panel ──────────────────────────────────────────────────────── -->
  <rect x="60" y="580" width="640" height="300" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="88" y="616" font-size="18" font-weight="bold" fill="#0f172a">Logic</text>

  <text x="88"  y="656" font-size="13" font-weight="bold" fill="#64748b">BUTTON</text>
  <text x="264" y="656" font-size="13" font-weight="bold" fill="#64748b">IO3 READS</text>
  <text x="500" y="656" font-size="13" font-weight="bold" fill="#64748b">FIRMWARE STATE</text>
  <line x1="88" y1="670" x2="672" y2="670" stroke="#e2e8f0" stroke-width="2"/>

  <text x="88"  y="700" font-size="14.5" fill="#0f172a">Released</text>
  <text x="264" y="700" font-size="14.5" fill="#0f172a">HIGH  (3V3 via pull-up)</text>
  <text x="500" y="700" font-size="14.5" fill="#0f172a">idle / waiting</text>
  <line x1="88" y1="716" x2="672" y2="716" stroke="#f1f5f9" stroke-width="2"/>

  <text x="88"  y="746" font-size="14.5" fill="#0f172a">Held down</text>
  <text x="264" y="746" font-size="14.5" fill="#0f172a">LOW  (tied to IO2)</text>
  <text x="500" y="746" font-size="14.5" fill="#0f172a">recording answer</text>

  <line x1="88" y1="782" x2="672" y2="782" stroke="#e2e8f0" stroke-width="2"/>
  <text x="88" y="814" font-size="15" font-weight="bold" fill="#0f172a">P3 header pin map</text>
  <text x="88" y="845" font-size="13.5" fill="#64748b">1 → IO2 (button GND)  ·  2 → IO3 (signal)  ·  3 → IO14 (n/c)  ·  4 → IO21 (n/c)</text>

  <!-- ── Notes panel ──────────────────────────────────────────────────────── -->
  <rect x="720" y="580" width="640" height="300" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="748" y="616" font-size="18" font-weight="bold" fill="#0f172a">Notes</text>

  <circle cx="754" cy="648" r="3.5" fill="#2563eb"/>
  <text x="770" y="653" font-size="13.5" fill="#0f172a">IO2 and IO3 are pins 1 and 2 of the 4-pin P3 expansion header.</text>
  <text x="770" y="674" font-size="13.5" fill="#0f172a">Pins 3 (IO14) and 4 (IO21) are left unconnected.</text>

  <circle cx="754" cy="705" r="3.5" fill="#2563eb"/>
  <text x="770" y="710" font-size="13.5" fill="#0f172a">No external resistor needed — IO3's internal pull-up is enabled in</text>
  <text x="770" y="731" font-size="13.5" fill="#0f172a">setup(). IO2 is a normal GPIO driven LOW, acting as a local ground.</text>
  <text x="770" y="752" font-size="13.5" fill="#0f172a">The switch is unpolarised: either terminal to either pin.</text>

  <circle cx="754" cy="783" r="3.5" fill="#2563eb"/>
  <text x="770" y="788" font-size="13.5" fill="#0f172a">Deep sleep: EXT1 wakes on IO3 going LOW. The RTC domain stays</text>
  <text x="770" y="809" font-size="13.5" fill="#0f172a">powered so the pull-up holds IO3 HIGH — IO3 is a strapping pin with</text>
  <text x="770" y="830" font-size="13.5" fill="#0f172a">no default pull and would otherwise float and wake instantly.</text>

  <circle cx="754" cy="861" r="3.5" fill="#2563eb"/>
  <text x="770" y="866" font-size="13.5" fill="#0f172a">Fallback: if the IO3 line is unreliable, set PIN_BTN 0 in pins.h.</text>

  <!-- ── Footer ───────────────────────────────────────────────────────────── -->
  <text x="60" y="910" font-size="12.5" fill="#94a3b8">Source of truth: ESP32/homework_assistant/pins.h  —  PIN_BTN 3 (IO3),  PIN_BTN_GND 2 (IO2)</text>

</svg>
