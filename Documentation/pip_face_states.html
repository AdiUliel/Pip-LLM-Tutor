  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

8px 44px rgba(42,53,80,0.18);\n\n  --font-display: 'Baloo 2', system-ui, sans-serif;\n  --font-body: 'Varela Round', system-ui, sans-serif;\n}\n\n* { box-sizing: border-box; }\n\n.kid-app {\n  font-family: var(--font-body);\n  color: var(--ink);\n  direction: rtl;\n  height: 100%;\n}\n\n/* ── robot animations ───────────────────────────── */\n@keyframes rb-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }\n@keyframes rb-bounce { 0%,100%{transform:translateY(0) rotate(0)} 25%{transform:translateY(-16px) rotate(-3deg)} 75%{transform:translateY(-16px) rotate(3deg)} }\n@keyframes rb-breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(0.98) translateY(3px)} }\n.rb-float   { animation: rb-float calc(3.4s / var(--rb-speed,1)) ease-in-out infinite; }\n.rb-bounce  { animation: rb-bounce calc(0.9s / var(--rb-speed,1)) ease-in-out infinite; }\n.rb-breathe { animation: rb-breathe calc(4.5s / var(--rb-speed,1)) ease-in-out infinite; }\n\n@keyframes rb-blink { 0%,92%,100%{transform:scaleY(1)} 96%{transform:scaleY(0.1)} }\n.rb-blink { animation: rb-blink calc(4s / var(--rb-speed,1)) ease-in-out infinite; transform-origin: center; transform-box: fill-box; }\n\n@keyframes rb-talk { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1.15)} }\n.rb-talk { animation: rb-talk calc(0.32s / var(--rb-speed,1)) ease-in-out infinite; transform-origin: center; transform-box: fill-box; }\n\n@keyframes rb-pulse-eye { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.22);opacity:0.7} }\n.rb-pulse-eye { animation: rb-pulse-eye calc(1.1s / var(--rb-speed,1)) ease-in-out infinite; transform-origin: center; transform-box: fill-box; }\n\n@keyframes rb-antenna { 0%,100%{opacity:0.65; r:13} 50%{opacity:1; r:15} }\n.rb-antenna { animation: rb-antenna calc(1.6s / var(--rb-speed,1)) ease-in-out infinite; transform-origin:center; transform-box: fill-box; }\n\n@keyframes rb-ring { 0%{transform:scale(0.4);opacity:0.55} 100%{transform:scale(1);opacity:0} }\n.rb-ring { animation: rb-ring calc(1.6s / var(--rb-speed,1)) ease-out infinite; transform-origin: 180px 200px; transform-box: view-box; }\n\n@keyframes rb-twinkle { 0%,100%{opacity:0.4;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.1)} }\n.rb-twinkle { animation: rb-twinkle calc(1.3s / var(--rb-speed,1)) ease-in-out infinite; transform-origin: center; transform-box: fill-box; }\n\n@keyframes rb-z { 0%{opacity:0;transform:translateY(6px)} 40%{opacity:1} 100%{opacity:0;transform:translateY(-12px)} }\n.rb-z { animation: rb-z calc(2.4s / var(--rb-speed,1)) ease-in-out infinite; }\n\n@media (prefers-reduced-motion: reduce) {\n  .rb-float, .rb-bounce, .rb-breathe, .rb-blink, .rb-talk,\n  .rb-pulse-eye, .rb-antenna, .rb-ring, .rb-twinkle, .rb-z { animation: none !important; }\n}\n\n/* ── shared kid buttons ─────────────────────────── */\n.kid-btn {\n  font-family: var(--font-display);\n  font-weight: 700;\n  border: none;\n  cursor: pointer;\n  border-radius: var(--r-md);\n  transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;\n}\n.kid-btn:active { transform: translateY(2px) scale(0.98); }\n\n/* ════════════════════════════════════════════════\n   PARENT / CONFIG side — soft & warm, grown-up\n   ════════════════════════════════════════════════ */\n.parent-app {\n  font-family: var(--font-body);\n  color: var(--ink);\n  direction: rtl;\n  height: 100%;\n  background: var(--paper);\n  display: flex;\n  flex-direction: column;\n}\n\n/* screen scaffold */\n.p-screen { display:flex; flex-direction:column; height:100%; }\n.p-body { flex:1; overflow-y:auto; padding: 20px 20px 28px; }\n.p-body::-webkit-scrollbar { width: 0; }\n\n/* warm top header */\n.p-header {\n  padding: 18px 20px 16px;\n  display:flex; align-items:center; gap:12px;\n}\n.p-header .p-title { font-family:var(--font-display); font-weight:800; font-size:24px; }\n.p-header .p-sub { color:var(--ink-soft); font-size:14px; margin-top:2px; }\n\n/* generic card */\n.p-card {\n  background: var(--card);\n  border-radius: var(--r-md);\n  box-shadow: var(--shadow);\n  padding: 20px;\n}\n.p-card + .p-card { margin-top: 14px; }\n\n/* labels + inputs */\n.p-label { font-family:var(--font-display); font-weight:700; font-size:15px; margin-bottom:8px; display:block; }\n.p-hint { color:var(--ink-soft); font-size:13.5px; line-height:1.5; }\n\n.p-input {\n  width:100%;\n  font-family: var(--font-body);\n  font-size:17px;\n  color:var(--ink);\n  background:#fff;\n  border:2px solid var(--sky-soft);\n  border-radius: var(--r-sm);\n  padding:14px 16px;\n  outline:none;\n  transition: border-color .14s, box-shadow .14s;\n}\n.p-input::placeholder { color:#A9B4CC; }\n.p-input:focus { border-color: var(--sky); box-shadow: 0 0 0 4px rgba(79,134,247,0.14); }\n\n/* primary pill button */\n.p-btn {\n  font-family: var(--font-display);\n  font-weight:800;\n  font-size:18px;\n  border:none; cursor:pointer;\n  border-radius: 999px;\n  padding:16px 24px;\n  background: var(--sky);\n  color:#fff;\n  box-shadow: 0 8px 20px var(--sky-shadow);\n  transition: transform .12s, box-shadow .12s, filter .12s, opacity .12s;\n  width:100%;\n}\n.p-btn:hover { filter:brightness(1.04); }\n.p-btn:active { transform: translateY(2px); box-shadow: 0 4px 12px var(--sky-shadow); }\n.p-btn:disabled { background:#C9D4EA; box-shadow:none; cursor:not-allowed; }\n.p-btn.ghost { background:#fff; color:var(--sky); box-shadow:none; border:2px solid var(--sky-soft); }\n.p-btn.ghost:hover { border-color: var(--sky); filter:none; }\n\n/* selectable option card (subjects, levels) */\n.p-opt {\n  border:2.5px solid var(--sky-soft);\n  border-radius: var(--r-md);\n  background:#fff;\n  padding:18px;\n  cursor:pointer;\n  transition: border-color .14s, background .14s, transform .12s;\n  display:flex; align-items:center; gap:14px;\n}\n.p-opt:hover { transform: translateY(-2px); }\n.p-opt.sel { border-color: var(--sky); background: var(--sky-soft); }\n.p-opt .p-opt-ico {\n  width:54px; height:54px; border-radius:16px; flex-shrink:0;\n  display:flex; align-items:center; justify-content:center; font-size:28px;\n}\n\n/* step progress bar */\n.p-steps { display:flex; gap:7px; padding: 4px 20px 0; }\n.p-steps .seg { flex:1; height:7px; border-radius:99px; background: var(--sky-soft); overflow:hidden; }\n.p-steps .seg i { display:block; height:100%; width:0; background: var(--sky); border-radius:99px; transition: width .4s ease; }\n.p-steps .seg.done i { width:100%; }\n.p-steps .seg.cur  i { width:50%; }\n\n/* number stepper */\n.p-stepper { display:flex; align-items:center; gap:16px; }\n.p-stepper button {\n  width:52px; height:52px; border-radius:50%; border:2px solid var(--sky-soft);\n  background:#fff; font-size:26px; font-family:var(--font-display); font-weight:800;\n  color:var(--sky); cursor:pointer; transition: all .12s; line-height:1;\n}\n.p-stepper button:hover { border-color:var(--sky); background:var(--sky-soft); }\n.p-stepper button:active { transform: scale(0.92); }\n.p-stepper .val { font-family:var(--font-display); font-weight:800; font-size:34px; min-width:54px; text-align:center; }\n\n/* device chip / status */\n.dev-chip {\n  display:inline-flex; align-items:center; gap:8px;\n  background:#fff; border:2px solid var(--mint-soft);\n  border-radius:999px; padding:7px 14px 7px 12px;\n  font-family:var(--font-display); font-weight:700; font-size:13.5px;\n}\n.dev-dot { width:10px; height:10px; border-radius:50%; background:var(--mint); box-shadow:0 0 0 0 rgba(54,201,160,0.5); animation: dev-beat 1.6s ease-out infinite; }\n.dev-dot.off { background:#C9D0DE; animation:none; }\n@keyframes dev-beat { 0%{box-shadow:0 0 0 0 rgba(54,201,160,0.5)} 70%{box-shadow:0 0 0 8px rgba(54,201,160,0)} 100%{box-shadow:0 0 0 0 rgba(54,201,160,0)} }\n\n@media (prefers-reduced-motion: reduce){ .dev-dot { animation:none !important; } }\n\n/* device searching ripple */\n.dv-ripple {\n  position:absolute; width:120px; height:120px; border-radius:50%;\n  border:3px solid var(--sky); opacity:0;\n  animation: dv-ripple 1.4s ease-out infinite;\n}\n@keyframes dv-ripple { 0%{transform:scale(0.5);opacity:0.6} 100%{transform:scale(1.5);opacity:0} }\n@media (prefers-reduced-motion: reduce){ .dv-ripple { animation:none !important; } }\n<\u002Fstyle>\n<style>\n  html, body { margin: 0; background: #0C0F18; color: #E8ECF6;\n    font-family: 'Baloo 2', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }\n  .va-doc { max-width: 1340px; margin: 0 auto; padding: 52px 40px 90px; }\n\n  .va-head { margin-bottom: 40px; max-width: 860px; }\n  .va-kicker { font-size: 13px; letter-spacing: .16em; text-transform: uppercase; color: #5EE7E7; font-weight: 800; }\n  .va-head h1 { font-size: 42px; font-weight: 800; margin: 10px 0 14px; color: #fff; letter-spacing: -.01em; }\n  .va-sub { font-size: 17.5px; color: #97A1B6; line-height: 1.6; margin: 0; font-weight: 600; }\n  .va-sub b { color: #CBD3E3; font-weight: 700; }\n\n  .va-sec-h { font-size: 13px; letter-spacing: .12em; text-transform: uppercase; color: #6E7A91; font-weight: 800;\n    border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px; margin: 44px 0 26px; }\n\n  .va-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }\n  @media (max-width: 1180px) { .va-grid { grid-template-columns: repeat(3, 1fr); } }\n  @media (max-width: 860px)  { .va-grid { grid-template-columns: repeat(2, 1fr); } }\n  @media (max-width: 560px)  { .va-grid { grid-template-columns: 1fr; } }\n\n  .va-card { background: linear-gradient(#141925, #0F131D); border: 1px solid rgba(255,255,255,0.07);\n    border-radius: 20px; padding: 16px 16px 18px; display: flex; flex-direction: column; }\n  .va-screen { position: relative; aspect-ratio: 1 / 1; border-radius: 14px;\n    background: radial-gradient(120% 110% at 50% 38%, #0A0E16 0%, #05070C 100%);\n    border: 1px solid rgba(94,231,231,0.10); display: flex; align-items: center; justify-content: center;\n    overflow: hidden; box-shadow: inset 0 0 36px rgba(94,231,231,0.05); }\n  .va-screen svg { width: 84%; height: 84%; overflow: visible; }\n\n  .va-cap { margin-top: 14px; }\n  .va-cap h3 { font-size: 18px; font-weight: 800; color: #fff; margin: 0; display: flex; align-items: baseline; gap: 8px; }\n  .va-cap h3 .en { font-size: 11px; font-weight: 700; color: #5EE7E7; letter-spacing: .04em;\n    text-transform: uppercase; opacity: .8; }\n  .va-tech { font-size: 12.5px; color: #8C97AD; line-height: 1.45; font-weight: 600; margin: 7px 0 0; }\n  .va-tech b { color: #76D8C4; font-weight: 700; }\n\n  .va-foot { margin-top: 46px; color: #6E7A91; font-size: 14px; line-height: 1.6; font-weight: 600; max-width: 800px; }\n\n  /* shared face */\n  .stroke { stroke: #5EE7E7; fill: none; stroke-linecap: round; }\n  .fill { fill: #5EE7E7; }\n  .warm { fill: #FFC93C; } .warm-s { stroke: #FFC93C; fill: none; stroke-linecap: round; }\n  .blush { fill: #FF9FB6; }\n  .glow { filter: url(#pipGlow); }\n\n  /* ── motion library ── */\n  @keyframes va-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }\n  .a-float { animation: va-float 3.2s ease-in-out infinite; }\n\n  @keyframes va-blink { 0%,93%,100%{transform:scaleY(1)} 96.5%{transform:scaleY(.08)} }\n  .a-blink { animation: va-blink 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }\n\n  @keyframes va-bulb { 0%,100%{opacity:.6} 50%{opacity:1} }\n  .a-bulb { animation: va-bulb 1.7s ease-in-out infinite; }\n\n  @keyframes va-pop { 0%,100%{transform:translateY(0) scale(1,1)} 22%{transform:translateY(-12px) scale(.94,1.08)}\n    44%{transform:translateY(0) scale(1.08,.9)} 60%{transform:translateY(-4px) scale(.98,1.02)} 76%{transform:translateY(0) scale(1.02,.98)} }\n  .a-pop { animation: va-pop 1.3s cubic-bezier(.5,0,.4,1) infinite; transform-box: fill-box; transform-origin: 120px 195px; }\n\n  @keyframes va-bounce {\n    0%,100%{transform:translateY(0) scale(1,1)} 12%{transform:translateY(4px) scale(1.08,.9)}\n    34%{transform:translateY(-34px) scale(.88,1.16) nsform:translate(0,3px) rotate(2deg)} }\n  .a-worry { animation: va-worry 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin: 120px 130px; }\n\n  @keyframes va-listen-sway { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }\n  .a-listen { animation: va-listen-sway 2.4s ease-in-out infinite; transform-box: fill-box; transform-origin: 120px 140px; }\n\n  @keyframes va-pulse-eye { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.22);opacity:.7} }\n  .a-pulse-eye { animation: va-pulse-eye 1.1s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }\n\n  @keyframes va-ring { 0%{transform:scale(.4);opacity:.55} 100%{transform:scale(1.25);opacity:0} }\n  .a-ring { animation: va-ring 1.6s ease-out infinite; transform-box: view-box; transform-origin: 120px 120px; }\n\n  @keyframes va-twinkle { 0%,100%{opacity:.35;transform:scale(.8)} 50%{opacity:1;transform:scale(1.12)} }\n  .a-twinkle { animation: va-twinkle 1.3s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }\n\n  @keyframes va-z { 0%{opacity:0;transform:translateY(8px) scale(.7)} 40%{opacity:1} 100%{opacity:0;transform:translateY(-16px) scale(1.1)} }\n  .a-z { animation: va-z 2.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }\n\n  @keyframes va-confetti { 0%{opacity:0;transform:translateY(-14px) rotate(0)} 14%{opacity:1} 100%{opacity:0;transform:translateY(140px) rotate(260deg)} }\n  .a-confetti { animation: va-confetti 1.9s ease-in infinite; transform-box: fill-box; transform-origin: center; }\n\n  @keyframes va-dot { 0%{opacity:0;transform:translateY(6px)} 40%{opacity:1} 100%{opacity:.15;transform:translateY(-6px)} }\n  .a-dot { animation: va-dot 1.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }\n\n  @keyframes va-spark { 0%,100%{opacity:.3} 50%{opacity:1} }\n  .a-spark { animation: va-spark .6s ease-in-out infinite; }\n\n  @keyframes va-glance { 0%,16%{transform:translate(0,-4px)} 32%,46%{transform:translate(-9px,-7px)} 62%,100%{transform:translate(0,-4px)} }\n  .a-glance { animation: va-glance 3s ease-in-out infinite; }\n\n  @keyframes va-wobble { 0%,100%{transform:rotate(-6deg) translateY(0)} 25%{transform:rotate(5deg) translateY(-4px)} 50%{transform:rotate(-4deg) translateY(0)} 75%{transform:rotate(6deg) translateY(-3px)} }\n  .a-wobble { animation: va-wobble 1.8s ease-in-out infinite; transform-box: fill-box; transform-origin: 120px 150px; }\n\n  @media (prefers-reduced-motion: reduce) {\n    [class*=\"a-\"] { animation: none !important; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n<svg width=\"0\" height=\"0\" style=\"position:absolute\" aria-hidden=\"true\">\n  <defs>\n    <filter id=\"pipGlow\" x=\"-60%\" y=\"-60%\" width=\"220%\" height=\"220%\">\n      <feGaussianBlur stdDeviation=\"2.6\" result=\"b\"><\u002FfeGaussianBlur>\n      <feMerge><feMergeNode in=\"b\"><\u002FfeMergeNode><feMergeNode in=\"SourceGraphic\"><\u002FfeMergeNode><\u002FfeMerge>\n    <\u002Ffilter>\n  <\u002Fdefs>\n<\u002Fsvg>\n\n<div class=\"va-doc\">\n  <header class=\"va-head\">\n    <div class=\"va-kicker\">פיפ · כל ההבעות<\u002Fdiv>\n    <h1>12 הפרצופים של פיפ<\u002Fh1>\n    \n  <\u002Fheader>\n\n  <h2 class=\"va-sec-h\">פונקציונלי — מצבי פעולה<\u002Fh2>\n  <div class=\"va-grid\" id=\"grid-fn\"><\u002Fdiv>\n\n  <h2 class=\"va-sec-h\">רגשי — תגובות והבעות<\u002Fh2>\n  <div class=\"va-grid\" id=\"grid-emo\"><\u002Fdiv>\n\n  \n<\u002Fdiv>\n\n<script>\n  // antenna fragment — bulb can pulse or run secondary lag\n  const ant = (cls='') => `<line class=\"stroke\" stroke-width=\"6\" x1=\"120\" y1=\"44\" x2=\"120\" y2=\"22\"/><circle class=\"fill ${cls}\" cx=\"120\" cy=\"15\" r=\"7\"/>`;\n\n  // each face = inner SVG markup (240x240). body motion applied on outer <g>.\n  const STATES = [\n    // ───── functional ─────\n    { id:'idle', he:'המתנה', en:'Idle', grp:'fn',\n      tech:'ריחוף עדין, מצמוץ אקראי ונורת אנטנה <b>נושמת<\u002Fb> — תחושת \"חי\" שקטה.',\n      svg:`<g class=\"glow a-float\">${ant('a-bulb')}\n        <rect class=\"fill a-blink\" x=\"69\" y=\"97\" width=\"30\" height=\"42\" rx=\"15\"/>\n        <rect class=\"fill a-blink\" x=\"141\" y=\"97\" width=\"30\" height=\"42\" rx=\"15\"/>\n        <path class=\"stroke\" stroke-width=\"10\" d=\"M88 162 q32 24 64 0\"/><\u002Fg>` },\n\n    { id:'speaking', he:'מדבר', en:'Speaking', grp:'fn',\n      tech:'<b>סנכרון שפתיים<\u002Fb> — הפה משנה צורות אמת בקצב מהיר, עם הנהון ראש קל.',\n      svg:`<g class=\"glow a-nod\">${ant()}\n        <rect class=\"fill\" x=\"69\" y=\"99\" width=\"28\" height=\"36\" rx=\"14\"/>\n        <rect class=\"fill\" x=\"143\" y=\"99\" width=\"28\" height=\"36\" rx=\"14\"/>\n        <ellipse class=\"fill\" cx=\"120\" cy=\"166\" rx=\"20\" ry=\"8\">\n          <animate attributeName=\"ry\" dur=\"0.7s\" repeatCount=\"indefinite\" values=\"4;15;6;13;3;11;5\" keyTimes=\"0;0.16;0.33;0.5;0.66;0.83;1\"/>\n          <animate attributeName=\"rx\" dur=\"0.7s\" repeatCount=\"indefinite\" values=\"22;15;24;16;20;14;22\" keyTimes=\"0;0.16;0.33;0.5;0.66;0.83;1\"/>\n        <\u002Fellipse><\u002Fg>` },\n\n    { id:'listening', he:'מקשיב', en:'Listening', grp:'fn',\n      tech:'עיניים <b>פועמות<\u002Fb>, גלי קול מתפשטים והראש נוטה קלות לכיוון הדובר.',\n      svg:`<g class=\"glow\">\n        <circle class=\"stroke a-ring\" stroke-width=\"4\" cx=\"120\" cy=\"120\" r=\"92\"/>\n        <circle class=\"stroke a-ring\" stroke-width=\"4\" cx=\"120\" cy=\"120\" r=\"92\" style=\"animation-delay:.8s\"/>\n        <g class=\"a-listen\">${ant()}\n          <circle class=\"fill a-pulse-eye\" cx=\"84\" cy=\"118\" r=\"16\"/>\n          <circle class=\"fill a-pulse-eye\" cx=\"156\" cy=\"118\" r=\"16\" style=\"animation-delay:.3s\"/>\n          <circle class=\"fill\" cx=\"120\" cy=\"170\" r=\"9\"/><\u002Fg><\u002Fg>` },\n\n    { id:'thinking', he:'חושב', en:'Thinking', grp:'fn',\n      tech:'<b>לופ מתוזמן<\u002Fb>: מבט מזדגג כלפי מעלה, הראש נוטה ובועות מחשבה עולות.',\n      svg:`<g class=\"glow a-tilt\">${ant()}\n        <g class=\"a-glance\"><circle class=\"fill\" cx=\"90\" cy=\"110\" r=\"12\"/><circle class=\"fill\" cx=\"150\" cy=\"110\" r=\"12\"/><\u002Fg>\n        <path class=\"stroke\" stroke-width=\"8\" d=\"M104 172 q16 -6 30 2\"/>\n        <g class=\"fill\">\n          <circle cx=\"186\" cy=\"74\" r=\"5\" class=\"a-dot\"/>\n          <circle cx=\"202\" cy=\"62\" r=\"7\" class=\"a-dot\" style=\"animation-delay:.25s\"/>\n          <circle cx=\"220\" cy=\"48\" r=\"9\" class=\"a-dot\" style=\"animation-delay:.5s\"/><\u002Fg><\u002Fg>` },\n\n    // ───── emotional ─────\n    { id:'happy', he:'שמח', en:'Happy', grp:'emo',\n      tech:'<b>קפיצה וכיווץ<\u002Fb> קליל (pop) עם לחיים ורודות — שמחה משחקית.',\n      svg:`<g class=\"glow a-pop\">${ant()}\n        <g class=\"blush\" opacity=\"0.45\" style=\"filter:blur(1px)\"><circle cx=\"52\" cy=\"150\" r=\"13\"/><circle cx=\"188\" cy=\"150\" r=\"13\"/><\u002Fg>\n        <g class=\"stroke\" stroke-width=\"10\"><path d=\"M70 124 q14 -22 28 0\"/><path d=\"M142 124 q14 -22 28 0\"/><\u002Fg>\n        <path class=\"fill\" d=\"M82 158 q38 46 76 0 q-38 14 -76 0 Z\"/><\u002Fg>` },\n\n    { id:'proud', he:'גאה', en:'Proud', grp:'emo',\n      tech:'<b>מתיחה כלפי מעלה<\u002Fb> (זקוף, חזה קדימה) עם ניצוצות זהב מנצנצים.',\n      svg:`<g class=\"glow a-stretch\">${ant('a-bulb')}\n        <g class=\"stroke\" stroke-width=\"7\" opacity=\"0.9\"><path d=\"M66 86 q18 -7 34 -2\"/><path d=\"M174 86 q-18 -7 -34 -2\"/><\u002Fg>\n        <g class=\"stroke\" stroke-width=\"10\"><path d=\"M70 120 q14 -18 28 0\"/><path d=\"M142 120 q14 -18 28 0\"/><\u002Fg>\n        <path class=\"stroke\" stroke-width=\"10\" d=\"M86 160 q34 30 68 0\"/>\n        <g class=\"warm\"><polygon class=\"a-twinkle\" points=\"48,83 51,90 58,92 51,94 48,101 45,94 38,92 45,90\"/>\n          <polygon class=\"a-twinkle\" points=\"196,95 199,102 206,104 199,106 196,113 193,106 186,104 193,102\" style=\"animation-delay:.4s\"/>\n          <polygon class=\"a-twinkle\" points=\"184,49 187,56 194,58 187,60 184,67 181,60 174,58 181,56\" style=\"animation-delay:.8s\"/><\u002Fg><\u002Fg>` },\n\n    { id:'celebrating', he:'חוגג', en:'Celebrating', grp:'emo',\n      tech:'<b>קפיצה גדולה<\u002Fb> עם מתיחה וריסוק, עיני כוכב וקונפטי נופל.',\n      svg:`<g class=\"glow\">\n        <g class=\"warm\"><rect class=\"a-confetti\" x=\"40\" y=\"20\" width=\"9\" height=\"9\" rx=\"2\"/>\n          <circle class=\"a-confetti blush\" cx=\"80\" cy=\"24\" r=\"5\" style=\"animation-delay:.3s\"/>\n          <rect class=\"a-confetti\" x=\"150\" y=\"20\" width=\"9\" height=\"9\" rx=\"2\" style=\"animation-delay:.15s\"/>\n          <circle class=\"a-confetti\" cx=\"196\" cy=\"24\" r=\"5\" style=\"animation-delay:.45s\"/>\n          <rect class=\"a-confetti blush\" x=\"116\" y=\"18\" width=\"8\" height=\"8\" rx=\"2\" style=\"animation-delay:.6s\"/><\u002Fg>\n        <g class=\"a-bounce\">${ant()}\n          <g class=\"fill\"><polygon points=\"84,99 89,112 103,113 92,122 96,135 84,127 72,135 76,122 65,113 79,112\"/>\n            <polygon points=\"156,99 161,112 175,113 164,122 168,135 156,127 144,135 148,122 137,113 151,112\"/><\u002Fg>\n          <path class=\"fill\" d=\"M82 158 q38 46 76 0 q-38 14 -76 0 Z\"/><\u002Fg><\u002Fg>` },\n\n    { id:'encouraging', he:'מעודד', en:'Encouraging', grp:'emo',\n      tech:'מצמוץ קריצה וטבעת חמה מתפשטת — \"אתה תצליח\".',\n      svg:`<g class=\"glow a-float\">\n        <circle class=\"stroke a-ring\" stroke-width=\"3\" cx=\"120\" cy=\"120\" r=\"96\"/>\n        ${ant()}\n        <g class=\"stroke\" stroke-width=\"7\" opacity=\"0.9\"><path d=\"M64 82 q18 -9 36 -2\"/><\u002Fg>\n        <rect class=\"fill a-blink\" x=\"69\" y=\"97\" width=\"30\" height=\"42\" rx=\"15\"/>\n        <path class=\"stroke\" stroke-width=\"10\" d=\"M142 120 q14 -18 28 0\"/>\n        <path class=\"stroke\" stroke-width=\"10\" d=\"M86 161 q34 28 68 0\"/><\u002Fg>` },\n\n    { id:'concerned', he:'אכפתי', en:'Concerned', grp:'emo',\n      tech:'גבות פנימיות מורמות ו<b>נדנוד דאגה<\u002Fb> איטי — מודאג בשבילך.',\n      svg:`<g class=\"glow a-worry\">${ant()}\n        <g class=\"stroke\" stroke-width=\"7\" opacity=\"0.9\"><path d=\"M66 98 L98 88\"/><path d=\"M174 98 L142 88\"/><\u002Fg>\n        <circle class=\"fill\" cx=\"86\" cy=\"122\" r=\"11\"/><circle class=\"fill\" cx=\"154\" cy=\"122\" r=\"11\"/>\n        <path class=\"stroke\" stroke-width=\"9\" d=\"M94 174 q26 -13 52 0\"/><\u002Fg>` },\n\n    { id:'playful', he:'שובב', en:'Playful', grp:'emo',\n      tech:'<b>תנועה משנית<\u002Fb> — נדנוד שובב עם overshoot, קריצה ולשון בחוץ.',\n      svg:`<g class=\"glow\">\n        <g class=\"a-wobble\">${ant()}\n          <g class=\"stroke\" stroke-width=\"7\" opacity=\"0.9\"><path d=\"M64 84 q18 -10 36 -1\"/><\u002Fg>\n          <rect class=\"fill a-blink\" x=\"69\" y=\"97\" width=\"30\" height=\"42\" rx=\"15\"/>\n          <path class=\"stroke\" stroke-width=\"10\" d=\"M142 122 q14 -20 28 0\"/>\n          <path class=\"stroke\" stroke-width=\"10\" d=\"M88 158 q32 28 64 0\"/>\n          <path class=\"blush\" d=\"M104 176 q16 18 32 0 q-16 6 -32 0 Z\"/><\u002Fg><\u002Fg>` },\n\n    { id:'sleepy', he:'הפסקה', en:'Break', grp:'emo',\n      tech:'<b>נשימה<\u002Fb> איטית, פיהוק שמתרחב (morph) ו-Zzz עולים.',\n      svg:`<g class=\"glow a-breathe\">${ant('a-bulb')}\n        <g class=\"stroke\" stroke-width=\"9\"><path d=\"M70 118 q14 13 28 0\"/><path d=\"M142 118 q14 13 28 0\"/><\u002Fg>\n        <ellipse class=\"fill\" cx=\"120\" cy=\"172\" rx=\"13\" ry=\"10\">\n          <animate attributeName=\"ry\" dur=\"3.6s\" repeatCount=\"indefinite\" values=\"6;20;6\" keyTimes=\"0;0.5;1\"/><\u002Fellipse>\n        <g class=\"fill\" font-family=\"'Baloo 2',sans-serif\" font-weight=\"800\">\n          <text x=\"172\" y=\"84\" font-size=\"22\" class=\"a-z\">z<\u002Ftext>\n          <text x=\"192\" y=\"62\" font-size=\"28\" class=\"a-z\" style=\"animation-delay:.6s\">Z<\u002Ftext>\n          <text x=\"212\" y=\"40\" font-size=\"34\" class=\"a-z\" style=\"animation-delay:1.2s\">Z<\u002Ftext><\u002Fg><\u002Fg>` },\n\n    { id:'oops', he:'אופס', en:'Oops', grp:'emo',\n      tech:'<b>רעידה<\u002Fb> קצרה, עיניים פעורות וניצוצות עדינים — לא מפחיד.',\n      svg:`<g class=\"glow\">\n        <g class=\"warm-s a-spark\" stroke-width=\"5\"><path d=\"M40 110 l-12 -6\"/><path d=\"M200 110 l12 -6\"/><path d=\"M44 140 l-12 4\"/><\u002Fg>\n        <g class=\"a-shake\">${ant()}\n          <g class=\"stroke\" stroke-width=\"7\" opacity=\"0.9\"><path d=\"M64 82 q18 -9 36 -2\"/><path d=\"M176 82 q-18 -9 -36 -2\"/><\u002Fg>\n          <circle class=\"fill\" cx=\"84\" cy=\"118\" r=\"18\"/><circle class=\"fill\" cx=\"156\" cy=\"118\" r=\"18\"/>\n          <ellipse class=\"fill\" cx=\"120\" cy=\"172\" rx=\"13\" ry=\"15\"/><\u002Fg><\u002Fg>` },\n  ];\n\n  function card(s){\n    return `<div class=\"va-card\">\n      <div class=\"va-screen\"><svg viewBox=\"0 0 240 240\">${s.svg}<\u002Fsvg><\u002Fdiv>\n      <div class=\"va-cap\"><h3>${s.he} <span class=\"en\">${s.en}<\u002Fspan><\u002Fh3>\n        <p class=\"va-tech\">${s.tech}<\u002Fp><\u002Fdiv><\u002Fdiv>`;\n  }\n  document.getElementById('grid-fn').innerHTML  = STATES.filter(s=>s.grp==='fn').map(card).join('');\n  document.getElementById('grid-emo').innerHTML = STATES.filter(s=>s.grp==='emo').map(card).join('');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
